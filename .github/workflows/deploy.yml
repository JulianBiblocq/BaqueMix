name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Checkout V2 branch
        uses: actions/checkout@v4
        with:
          ref: v2-sequencer-engine
          path: temp-v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies (main/V1)
        run: npm ci

      - name: Build V1 (production)
        run: |
          npm run build
          mv dist dist-prod

      - name: Build V2 (test)
        run: |
          cd temp-v2
          npm ci
          DEPLOY_ENV=test npm run build
          mv dist ../dist-test
          cd ..
          rm -rf temp-v2

      - name: Assemble final dist
        run: |
          mkdir dist
          mv dist-prod/* dist/
          mkdir -p dist/test
          mv dist-test/* dist/test/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
